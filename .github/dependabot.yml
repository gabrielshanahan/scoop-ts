version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    ignore:
      # @types/node tracks the OLDEST supported Node runtime (engines: >=22), not the newest —
      # a types major beyond the floor would let code use APIs Node 22 doesn't have.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
